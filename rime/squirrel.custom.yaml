patch:
  'style/candidate_list_layout': linear # stacked | linear | tabled
  show_notifications_when: appropriate # options: always | never | appropriate
  app_options:
    dev.zed.Zed:
      ascii_mode: true # 默认开启英文
      no_inline: true # 不使用行內編輯
      vim_mode: true # 退出VIM插入模式自動切換輸入法狀態
    com.microsoft.VSCode:
      ascii_mode: true
    com.raycast.macos:
      ascii_mode: true
    com.apple.Spotlight:
      ascii_mode: true
    com.apple.Terminal:
      ascii_mode: true
      no_inline: true
    dev.warp.Warp-Stable:
      ascii_mode: true
      no_inline: true
    com.mitchellh.ghostty:
      ascii_mode: true
      no_inline: true
    com.google.Chrome:
      # 規避 https://github.com/rime/squirrel/issues/435
      ascii_mode: true
      inline: true
    ru.keepcoder.Telegram:
      # 規避 https://github.com/rime/squirrel/issues/475
      inline: true
